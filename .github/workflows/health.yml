name: Automations health sync
on:
  schedule:
    - cron: "30 11,16,21 * * *"   # ~7:30am / 12:30pm / 5:30pm ET
  workflow_dispatch:
concurrency:
  group: hub-page
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOTION_KEY: ${{ secrets.NOTION_KEY }}
      GH_TOKEN: ${{ secrets.HEALTH_GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Sync automation health to Notion
        run: python health_sync.py
